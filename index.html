<!DOCTYPE html>                                                                      <html lang="en">                                                                    <head>                                                                              <title>Hello, Map!</title>                                                        <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />              <meta name="description" content="" />

  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>

  <style>
    html,
    body,
    #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>

</head>
<body>

  <div id="viewDiv"></div>

  <script>
  
    require([
     "esri/config",
      "esri/Map",
      "esri/views/MapView",
      // These two give our web map the ability to work with graphics
      "esri/Graphic",
      "esri/layers/GraphicsLayer",

      //addng in the module for the feature layers
      "esri/layers/FeatureLayer",

      //adding editor widget
      "esri/widgets/Editor"

    ], function (esriConfig,Map, MapView, Graphic, GraphicsLayer, FeatureLayer, Editor) {

      //esriConfig.apiKey = "AAPTau7l9zV1JqiD1DBhryF-CPg..ZLSOcbqgh0ONE2slQEiaTqrrUI9TlEQg-3ZfWtrR-Ur2oKQRwsv-KCdLKsARwQBmPGaG2FKABsW3UmmWIU-XJKOMLXRXHIwIGTZ-em8fZ6ln7jgXILnyk_sdiPEmyHHJ2R3aewVZeHoN_D5zBlUrSDh34lDuLWb8Pqkd_AZTEeTKoUFodKYWH-GFpwherADvTOzXsWe5qGAf9LXl64x-tfRA3Ohh_KUnBRvjZni6S_7xIgaT4DTFIQZ8DMMEk0vvSSN_JwLUAT1_WThHLKNd";
      const map = new Map({
        basemap: "streets"
        //basemap: "arcgis-topographic" what I would use if my API key worked
      });

      const view = new MapView({
          map: map,
          center: [-164.083328, 59.940174], // Longitude, latitude
          zoom: 13, // Zoom level
          container: "viewDiv" // Div element
        });

        //adding the constructor for the graphics layer
        const graphicsLayer = new GraphicsLayer();
        map.add(graphicsLayer);

        //defining the geometry of the point
        const point = {
          type: "point",
          longitude: -164.083328,
          latitude: 59.940174
        };

        //defining the maker style
        const simpleMarkerSymbol = {
          type: "simple-marker",
          style: "square",
          color: [0, 0, 139], 
          outline: {
            color: [255, 255, 255],
            width: 2
          }
        };

        //defining popup properties
        const popupTemplate = {
        title: "{Name}",
        content: "{Description}"
        }
        const attributes = {
          Name: "Stevie Ray Vaughan Statue",
          Description: "A bronze sculpture of Stevie Ray Vaughan by Ralph Helmick"
        }
    
        //creating the point
        const pointGraphic = new Graphic({
          geometry: point,
          symbol: simpleMarkerSymbol,

          //adding popup properties
          popupTemplate: popupTemplate,
          attributes: attributes
        });

        //creating a polyline
      const polyline = {
        type: "polyline",
        paths: [
          [-164.090000, 59.940174],
          [-164.090000, 59.950000]
        ]
      };

      //define the line's style
      const simpleLineSymbol = {
        type: "simple-line",
        color: [255, 0, 0],
        width: 2
      };

      //Combine the style and symbol
      const lineGraphic = new Graphic({
        geometry: polyline,
        symbol: simpleLineSymbol
      });

      //creating a polygon
      const polygon = {
        type: "polygon",
        rings: [
          [
            [-164.083328, 59.940174],
            [-164.050000, 59.950000],
            [-164.083330, 59.960000],
            [-164.083328, 59.940174]
          ]
        ]
      };

      //define the polygon's style
      const simpleFillSymbol = {
        type: "simple-fill",
        color: [255, 255, 0],
        outline: {
          color: [255, 0, 0],
          width: 2
        }
      };

      //Combine the style and symbol
      const polygonGraphic = new Graphic({
        geometry: polygon,
        symbol: simpleFillSymbol
      });

        // Explicitly push the graphic onto the map's graphics layer canvas
        graphicsLayer.add(pointGraphic);
        graphicsLayer.add(lineGraphic);
        graphicsLayer.add(polygonGraphic);

      //adding constructor for the  feature layer
      const nativevillage = new FeatureLayer({
        url: "https://services2.arcgis.com/FiaPA4ga0iQKduv3/arcgis/rest/services/Alaska_Native_Village_Statistical_Areas_v1/FeatureServer/0",
        apiKey: "", //Ignoring my broken API key right now
        outFields: ["NAME", "BASENAME", "Shape__Area", "Shape__Length"],
        popupTemplate: {
          title: "{BASENAME}",
          content: "<b>Name:</b> {NAME}<br>"+
          "<b>Base Name:</b> {BASENAME}<br>"+
          "<b>Area:</b> {Shape__Area}<br>"+
          "<b>Length:</b> {Shape__Length}"
        }
      });
    
      const airports2 = new FeatureLayer({
        url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/My_Airports_2/FeatureServer/0",
        apiKey: "",
        outFields: ["AirportCode"],
      })

            //setting up airport icon
      const airportSymbol = {
        "type": "simple",
        "symbol": {
          "type": "picture-marker",
          "url": "local_airport_24dp_E3E3E3.png",
          "width": "18px",
          "height": "18px"
        }
      }

      //const to make the airport labels
      const airportLabels = {
        symbol: {
          type: "text",
          color: "FFFFFF",
          haloColor: "#5E8D74",
          haloSize: "2px",
          font: {
            size: "12px",
            family: "Noto Sans",
            style: "italic",
            weight: "normal"
          }
        },


        labelPlacement: "above-center",
        labelExpressionInfo: {
          expression: "$feature.Fac_Name"
        }
      };

      //setting up helicopter icons
      const heliportSymbol = {
        "type": "simple",
        "symbol": {
          "type": "picture-marker",
          "url": "ac_unit_24dp_E3E3E3.png",
          "width": "18px",
          "height": "18px"
        }
      }

      //Adding Airports layer for Challenge 4
      const usAirports = new FeatureLayer({
        url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/US_Airports_G576_Lab2/FeatureServer/0",
        renderer: airportSymbol,
        definitionExpression: "Fac_Type = 'AIRPORT'", //adding sql to filter for airports
        labelingInfo: [airportLabels], //adding labels
        apiKey: "", 
      });

      //Adding Heliports layer for Challenge 4
      const usHeliports = new FeatureLayer({
        url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/US_Airports_G576_Lab2/FeatureServer/0",
        renderer: heliportSymbol,
        definitionExpression: "Fac_Type = 'HELIPORT'", //adding sql to filter for heliports
        apiKey: "", 
      });


    
      //addign feature layer to map
      map.add(nativevillage);
      map.add(usAirports);
      map.add(usHeliports);
      map.add(airports2);

      // Set the point layer's LayerInfo
      const pointInfos = {
        layer: airports2
      }

      // Begin editor constructor
      const editor = new Editor({
        view: view,
        layerInfos: [pointInfos]
      });

      // Add the widget to the  view
      view.ui.add(editor, "top-right");

    }); // GEMINI: Moved the closing require parenthesis down here so all constructors fall within the correct functional scope
  </script>

</body>
</html>
